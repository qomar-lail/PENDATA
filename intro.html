<h2>📈 Hasil Statistik</h2>

<p>Berikut adalah hasil perhitungan mean dan modus:</p>

<table border="1" id="tabel-statistik" style="border-collapse: collapse; width: 100%;">
    <thead>
        <tr style="background:#f2f2f2;">
            <th>Variabel</th>
            <th>Mean</th>
            <th>Modus</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td colspan="3" style="text-align:center;">Data belum dimuat</td>
        </tr>
    </tbody>
</table>

<script>
fetch('statistik.csv')
    .then(response => response.text())
    .then(data => {
        const rows = data.split('\n');
        const tbody = document.querySelector('#tabel-statistik tbody');
        tbody.innerHTML = '';

        rows.forEach(row => {
            if (row.trim() === '') return;
            const tr = document.createElement('tr');
            row.split(',').forEach(cell => {
                const td = document.createElement('td');
                td.textContent = cell;
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
    })
    .catch(() => {
        document.querySelector('#tabel-statistik tbody').innerHTML =
            '<tr><td colspan="3" style="text-align:center;color:red;">Gagal memuat statistik.csv</td></tr>';
    });
</script>
